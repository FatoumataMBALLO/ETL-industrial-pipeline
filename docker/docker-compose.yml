services:

  postgres:
    image: postgres:15
    container_name: etl-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: etl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  spark:
    image: apache/spark:3.5.1
    container_name: spark-container
    volumes:
      - ../:/app
    working_dir: /app
    command: tail -f /dev/null

volumes:
  postgres_data: